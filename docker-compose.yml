services:
  postgres:
    image: postgres:16-alpine
    container_name: team-finder-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamfinder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamfinder}
      POSTGRES_DB: ${POSTGRES_DB:-teamfinder}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-teamfinder} -d $${POSTGRES_DB:-teamfinder}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: team-finder-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: team-finder-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://teamfinder:teamfinder@postgres:5432/teamfinder?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: team-finder-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
